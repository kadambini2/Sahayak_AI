<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಸಹಾಯಕ AI - ಹವಾಮಾನ ಸ್ಥಿತಿಸ್ಥಾಪಕ ಜೀವನೋಪಾಯ ಯೋಜಕ</title>
    <style>
        :root { --primary: #1b5e20; --accent: #ff9800; --bg: #f4f7f4; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Welcome Page Overlay */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 2000; color: white; text-align: center;
        }

        /* Sidebar UI */
        #sidebar { width: 280px; background: var(--primary); color: white; display: none; flex-direction: column; padding: 30px 20px; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        .nav-link { padding: 15px; margin: 5px 0; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-link.active { background: var(--accent); font-weight: bold; }

        /* Main Content */
        .content-section { flex: 1; display: none; flex-direction: column; overflow-y: auto; }
        .hero {
            padding: 60px 20px; text-align: center; color: white;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1592419044706-39796d40f98c?auto=format&fit=crop&w=1600');
            background-size: cover; background-position: center;
        }

        .main-btn {
            background: var(--accent); color: white; border: none; padding: 18px 45px; 
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-top: 15px;
        }

        /* Grid Cards */
        .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--accent); cursor: pointer; text-align: center; }

        /* Floating Arya Bot at Right Bottom */
        .arya-avatar { 
            position: fixed; bottom: 20px; right: 20px; width: 80px; height: 80px; 
            background: white; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none; z-index: 3000; cursor: pointer; overflow: hidden;
            border: 3px solid var(--accent);
        }
        .arya-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .guide-box { background: white; margin: 15px 0; padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="font-size: 3rem;">ನಿಮ್ಮ ಹೊಲ, ನಿಮ್ಮ ಬದುಕು</h1>
        <button class="main-btn" onclick="startApp()">ಪ್ರಾರಂಭಿಸಿ (Start)</button>
    </div>

    <nav id="sidebar">
        <h2 style="margin-bottom: 30px;">ಸಹಾಯಕ AI</h2>
        <div class="nav-link active" onclick="showSection('dashboard')">🏠 ಡ್ಯಾಶ್‌ಬೋರ್ಡ್</div>
        <div class="nav-link" onclick="showSection('weather-page')">☁️ ಹವಾಮಾನ</div>
        <div class="nav-link" onclick="showSection('roi-page')">💰 20+ ಆದಾಯ ಮಾರ್ಗಗಳು</div>
    </nav>

    <main id="dashboard" class="content-section">
        <div class="hero">
            <h1>ಮಾಹಿತಿಗಾಗಿ ಕೆಳಗಿನ ಬಟನ್ ಒತ್ತಿ</h1>
            <button class="main-btn" onclick="getAdvice()">🎤 ಮಾಹಿತಿ ಪಡೆಯಲು ಮಾತನಾಡಿ</button>
        </div>
        <div class="card-container">
            <div class="card" onclick="showSection('weather-page')">
                <h3>☁️ ಹವಾಮಾನ</h3>
                <p id="weather-brief">ಮಾಹಿತಿಗಾಗಿ ಕಾಯಲಾಗುತ್ತಿದೆ...</p>
            </div>
            <div class="card" onclick="showSection('roi-page')">
                <h3>💰 20+ ಆದಾಯ ಮಾರ್ಗಗಳು</h3>
                <p id="roi-brief">ಸಂಪೂರ್ಣ ವಿವರಗಳಿಗಾಗಿ ಕ್ಲಿಕ್ ಮಾಡಿ.</p>
            </div>
        </div>
    </main>

    <div id="weather-page" class="content-section">
        <div style="background:var(--primary); color:white; padding:40px; text-align:center;">
            <h1>ಹವಾಮಾನ ವರದಿ</h1>
        </div>
        <div id="weather-full" style="padding:40px;"></div>
    </div>

    <div id="roi-page" class="content-section">
        <div style="background:var(--primary); color:white; padding:40px; text-align:center;">
            <h1>ಆದಾಯದ ಮಾರ್ಗಗಳು</h1>
        </div>
        <div id="roi-full" style="padding:40px;"></div>
    </div>

    <div id="arya-bot" class="arya-avatar" onclick="speakText('ಹೇಳಿ, ನಾನು ನಿಮಗೆ ಹೇಗೆ ಸಹಾಯ ಮಾಡಲಿ?')">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Arya">
    </div>

    <script>
        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'kn-IN';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function startApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('arya-bot').style.display = 'block';
            showSection('dashboard');
            speakText("ನಮಸ್ಕಾರ, ಸಹಾಯಕ ಎ ಐ ಗೆ ಸ್ವಾಗತ. ನಾನು ಆರ್ಯ. ನಿಮ್ಮ ಕೃಷಿ ಬದುಕು ಸುಧಾರಿಸಲು ನಾನು ಇಲ್ಲಿದ್ದೇನೆ.");
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        async function getAdvice() {
            speakText("ಖಂಡಿತ, ನಾನು ನಿಮಗಾಗಿ ಮಾಹಿತಿಯನ್ನು ಹುಡುಕುತ್ತಿದ್ದೇನೆ.");
            const res = await fetch('/api/recommend');
            const data = await res.json();

            document.getElementById('weather-brief').innerText = data.weather;
            document.getElementById('weather-full').innerHTML = `<div class="guide-box">${data.weather}</div>`;
            
            // Fixes "undefined" by ensuring backend uses 'how' field
            document.getElementById('roi-full').innerHTML = data.options.map(o => `
                <div class="guide-box">
                    <b style="color:var(--primary);">${o.name}</b><br>
                    <span>💰 ಲಾಭ: ${o.income}</span><br>
                    <p>💡 <b>ವಿವರ:</b> ${o.how}</p>
                </div>
            `).join("");

            showSection('roi-page');
            speakText("ನಿಮಗಾಗಿ ವಿವರವಾದ ಮಾಹಿತಿ ಸಿದ್ಧವಾಗಿದೆ. ದಯವಿಟ್ಟು ಗಮನಿಸಿ.");
        }
    </script>
</body>
</html>
