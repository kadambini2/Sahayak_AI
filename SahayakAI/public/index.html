<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಸಹಾಯಕ AI - ಹವಾಮಾನ ಸ್ಥಿತಿಸ್ಥಾಪಕ ಜೀವನೋಪಾಯ ಯೋಜಕ</title>
    <style>
        :root { --primary: #1b5e20; --accent: #ff9800; --bg: #f4f7f4; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Welcome Page Overlay */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 2000; color: white; text-align: center;
        }

        /* Sidebar */
        #sidebar { width: 280px; background: var(--primary); color: white; display: none; flex-direction: column; padding: 30px 20px; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        .nav-link { padding: 15px; margin: 5px 0; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-link.active { background: var(--accent); font-weight: bold; }

        /* AI Avatar Arya */
        .arya-avatar { 
            position: fixed; bottom: 20px; right: 20px; width: 90px; height: 90px; 
            background: url('https://cdn-icons-png.flaticon.com/512/4712/4712109.png') no-repeat center; 
            background-size: contain; cursor: pointer; z-index: 3000; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); display: none; 
        }

        /* Main Content */
        .content-section { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 50px; }
        
        .hero {
            padding: 60px 20px; text-align: center; color: white;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1592419044706-39796d40f98c?auto=format&fit=crop&w=1600');
            background-size: cover; background-position: center;
        }

        .main-btn {
            background: var(--accent); color: white; border: none; padding: 18px 45px; 
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-top: 15px; transition: 0.3s;
        }

        /* Card UI */
        .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 40px; }
        .card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); border-top: 6px solid var(--accent); cursor: pointer;
        }

        .guide-box { background: white; margin: 15px 0; padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>ನಿಮ್ಮ ಹೊಲ, ನಿಮ್ಮ ಬದುಕು</h1>
        <p style="font-size: 1.2rem; margin-bottom: 20px;">ಸಹಾಯಕ AI ಗೆ ಸ್ವಾಗತ</p>
        <button class="main-btn" onclick="startApp()">ಪ್ರಾರಂಭಿಸಿ (Start)</button>
    </div>

    <div id="arya-icon" class="arya-avatar" onclick="aryaClickSpeech()"></div>

    <nav id="sidebar">
        <h2 style="padding-left: 15px;">ಸಹಾಯಕ AI</h2>
        <div class="nav-link" id="nav-dashboard" onclick="showSection('dashboard')">🏠 ಡ್ಯಾಶ್‌ಬೋರ್ಡ್</div>
        <div class="nav-link" id="nav-weather" onclick="showSection('weather-page')">☁️ ಹವಾಮಾನ</div>
        <div class="nav-link" id="nav-roi" onclick="showSection('roi-page')">💰 ಆದಾಯ ಮಾರ್ಗಗಳು</div>
    </nav>

    <main id="dashboard" class="content-section">
        <div class="hero">
            <h1>ಮಾಹಿತಿಗಾಗಿ ಕೆಳಗಿನ ಬಟನ್ ಒತ್ತಿ</h1>
            <button class="main-btn" onclick="getAdvice()">🎤 ಮಾಹಿತಿ ಪಡೆಯಲು ಮಾತನಾಡಿ</button>
        </div>
        <div class="card-container">
            <div class="card" onclick="showSection('weather-page')">
                <h3>☁️ ಹವಾಮಾನ</h3>
                <p id="weather-brief">ಮಾಹಿತಿಗಾಗಿ ಆರ್ಯನನ್ನು ಕೇಳಿ...</p>
            </div>
            <div class="card" onclick="showSection('roi-page')">
                <h3>💰 25+ ಆದಾಯ ಮಾರ್ಗಗಳು</h3>
                <p id="roi-brief">ಸಂಪೂರ್ಣ ವಿವರಗಳಿಗಾಗಿ ಕ್ಲಿಕ್ ಮಾಡಿ...</p>
            </div>
        </div>
    </main>

    <div id="weather-page" class="content-section">
        <div style="background:var(--primary); color:white; padding:40px; text-align:center;">
            <button onclick="showSection('dashboard')" style="float:left; padding:10px;">←</button>
            <h1>ಹವಾಮಾನ ವರದಿ</h1>
        </div>
        <div id="weather-full" style="padding:40px;"></div>
    </div>

    <div id="roi-page" class="content-section">
        <div style="background:var(--primary); color:white; padding:40px; text-align:center;">
            <button onclick="showSection('dashboard')" style="float:left; padding:10px;">←</button>
            <h1>25+ ಆದಾಯ ಮಾರ್ಗಗಳು</h1>
        </div>
        <div id="roi-full" style="padding:40px;"></div>
    </div>

    <script>
        let lastData = null;

        function speakText(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'kn-IN';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // Arya introduces herself when "Start" is clicked
        function startApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('arya-icon').style.display = 'block';
            showSection('dashboard');
            
            speakText("ನಮಸ್ಕಾರ, ಸಹಾಯಕ ಎ ಐ ಗೆ ಸ್ವಾಗತ. ನಾನು ನಿಮ್ಮ ಕೃಷಿ ಸಲಹೆಗಾರ್ತಿ ಆರ್ಯ. ನಿಮಗೆ ಯಾವ ಮಾಹಿತಿ ಬೇಕು?");
        }

        // Arya speaks when her icon is clicked
        function aryaClickSpeech() {
            speakText("ನಾನು ಆರ್ಯ. ನಿಮ್ಮ ಹೊಲದ ಹವಾಮಾನ ಮತ್ತು ಆದಾಯದ ಮಾರ್ಗಗಳ ಬಗ್ಗೆ ತಿಳಿಯಲು ಮಾಹಿತಿ ಬಟನ್ ಒತ್ತಿರಿ.");
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        async function getAdvice() {
            speakText("ಖಂಡಿತ, ನಾನು ನಿಮಗಾಗಿ ಇಪ್ಪತ್ತೈದಕ್ಕೂ ಹೆಚ್ಚು ಆದಾಯದ ಮಾರ್ಗಗಳನ್ನು ಸಿದ್ಧಪಡಿಸಿದ್ದೇನೆ. ದಯವಿಟ್ಟು ಗಮನಿಸಿ.");
            
            const res = await fetch('/api/recommend');
            const data = await res.json();
            lastData = data;

            document.getElementById('weather-brief').innerText = data.weather;
            document.getElementById('weather-full').innerHTML = `<div class="guide-box">${data.weather}</div>`;
            
            // Fixes "undefined" by using 'o.how'
            document.getElementById('roi-full').innerHTML = data.options.map(o => `
                <div class="guide-box">
                    <b style="color:var(--primary);">${o.name}</b><br>
                    <span>💰 ಲಾಭ: ${o.income}</span><br>
                    <p>💡 <b>ವಿವರ:</b> ${o.how}</p>
                </div>
            `).join("");

            showSection('roi-page');
        }
    </script>
</body>
</html>
